# ============================================================
# docker-compose.yml — 掼蛋游戏完整部署
# 开发：docker compose up
# 生产：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guandan-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - DB_PATH=/data/guandan.db
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-200}
    volumes:
      - guandan-data:/data
    networks:
      - guandan-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:1.25-alpine
    container_name: guandan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      server:
        condition: service_healthy
    networks:
      - guandan-net

volumes:
  guandan-data:
    driver: local

networks:
  guandan-net:
    driver: bridge
