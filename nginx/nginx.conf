# ============================================================
# Nginx 反向代理配置 — 掼蛋游戏
# 前端静态文件 + API 代理 + WebSocket 代理
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # 性能
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;

    # 上游服务
    upstream guandan_backend {
        server server:3001;
        keepalive 32;
    }

    # HTTP → HTTPS 重定向（有 SSL 证书时启用）
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl http2;
        server_name _;

        # SSL 证书（有证书时取消注释）
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # 安全头
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";

        # 客户端最大请求体
        client_max_body_size 2m;

        # ---- API 代理 ----
        location /api/ {
            proxy_pass http://guandan_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- Socket.IO WebSocket 代理 ----
        location /socket.io/ {
            proxy_pass http://guandan_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;  # WebSocket 长连接
            proxy_send_timeout 86400s;
        }

        # ---- 健康检查 ----
        location /health {
            proxy_pass http://guandan_backend;
            proxy_http_version 1.1;
            access_log off;
        }

        # ---- 前端静态文件（由 Node 服务提供，或直接 serve）----
        # 如果前端文件直接挂载到 Nginx，取消注释以下块并注释上面的 API 代理
        # location / {
        #     root /usr/share/nginx/html;
        #     index index.html;
        #     try_files $uri $uri/ /index.html;
        # }

        # 当前配置：所有请求转发给 Node（Node 负责 serve 前端）
        location / {
            proxy_pass http://guandan_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
